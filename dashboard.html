<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — Shoply</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="topnav" id="topnav"></nav>

<main class="wrap">
  <div class="page-head">
    <div>
      <h1>The shelf</h1>
      <div class="sub" id="result-count"></div>
    </div>
  </div>

  <div class="toolbar">
    <input type="search" id="search-input" placeholder="Search products…">
    <select id="category-filter"></select>
    <select id="sort-select">
      <option value="default">Sort: Featured</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="name-asc">Name: A–Z</option>
    </select>
  </div>

  <div class="grid-products" id="product-grid"></div>
</main>

<footer class="site-foot">Shoply — a demo storefront.</footer>

<script src="js/app.js"></script>
<script>
  const session = Auth.requireRole('user');

  if(session){
    renderUserNav('dashboard');

    const grid = document.getElementById('product-grid');
    const searchInput = document.getElementById('search-input');
    const categorySelect = document.getElementById('category-filter');
    const sortSelect = document.getElementById('sort-select');
    const resultCount = document.getElementById('result-count');

    const products = Store.getProducts();
    const categories = [...new Set(products.map(p => p.category))].sort();
    categorySelect.innerHTML = '<option value="all">All categories</option>' +
      categories.map(c => `<option value="${c}">${c}</option>`).join('');

    function render(){
      const q = searchInput.value.trim().toLowerCase();
      const cat = categorySelect.value;
      const sort = sortSelect.value;

      let list = products.filter(p =>
        (cat === 'all' || p.category === cat) &&
        (q === '' || p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q))
      );

      if(sort === 'price-asc') list = [...list].sort((a,b) => a.price - b.price);
      if(sort === 'price-desc') list = [...list].sort((a,b) => b.price - a.price);
      if(sort === 'name-asc') list = [...list].sort((a,b) => a.name.localeCompare(b.name));

      resultCount.textContent = `${list.length} item${list.length===1?'':'s'}`;

      grid.innerHTML = list.map(p => `
        <a href="product.html?id=${p.id}" class="product-card">
          <div class="product-art" style="background:${p.color}">${p.art}</div>
          <div class="product-body">
            <div class="product-cat">${p.category}</div>
            <div class="product-name">${escapeHtml(p.name)}</div>
            <div class="product-price-row">
              <span class="price-tag">${p.price.toLocaleString('en-IN')}</span>
              ${p.stock === 0
                ? '<span class="stock-note low">Out of stock</span>'
                : (p.stock <= 4 ? `<span class="stock-note low">Only ${p.stock} left</span>` : `<span class="stock-note">In stock</span>`)}
            </div>
          </div>
        </a>
      `).join('') || `<div class="empty-state" style="grid-column:1/-1;"><div class="glyph">🔍</div>No products match your search.</div>`;
    }

    searchInput.addEventListener('input', render);
    categorySelect.addEventListener('change', render);
    sortSelect.addEventListener('change', render);
    render();
  }
</script>
</body>
</html>
