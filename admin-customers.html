<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers — Shoply Admin</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="topnav" id="topnav"></nav>

<div class="admin-shell">
  <aside class="admin-side" id="admin-side"></aside>
  <main class="admin-main">
    <div class="section-title">
      <h2 style="font-family:var(--font-display); font-size:1.6rem;">Customers</h2>
      <div class="sub" id="cust-count" style="color:var(--muted); font-size:.88rem;"></div>
    </div>

    <div id="customers-wrap"></div>
  </main>
</div>

<script src="js/app.js"></script>
<script>
  const session = Auth.requireRole('admin');

  if(session){
    renderAdminNav();
    renderAdminSidebar('customers');

    const customers = Store.getUsers().filter(u => u.role === 'user');
    const orders = Store.getOrders();
    document.getElementById('cust-count').textContent = `${customers.length} customer(s)`;

    const wrap = document.getElementById('customers-wrap');

    if(customers.length === 0){
      wrap.innerHTML = `<div class="empty-state"><div class="glyph">👥</div>No customers have registered yet.</div>`;
    } else {
      wrap.innerHTML = `
        <div class="card" style="padding:4px 6px; overflow-x:auto;">
          <table>
            <thead>
              <tr><th>Name</th><th>Email</th><th>Phone</th><th>Address</th><th>Orders</th></tr>
            </thead>
            <tbody>
              ${customers.map(c => {
                const count = orders.filter(o => o.userId === c.id).length;
                return `
                  <tr>
                    <td>${escapeHtml(c.name)}</td>
                    <td class="mono">${escapeHtml(c.email)}</td>
                    <td>${escapeHtml(c.phone || '—')}</td>
                    <td style="max-width:220px; font-size:.82rem; color:var(--muted);">${escapeHtml(c.address || '—')}</td>
                    <td>${count}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    }
  }
</script>
</body>
</html>
