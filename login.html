<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Shoply</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="topnav">
  <div class="bar">
    <a href="index.html" class="brand">Shoply<span class="dot">.</span></a>
    <div class="nav-links">
      <a href="register.html">Create account</a>
    </div>
  </div>
</nav>

<main class="auth-shell">
  <div class="narrow">
    <div class="card auth-card">
      <div class="auth-eyebrow">Welcome back</div>
      <h1 style="font-size:1.6rem;">Log in to Shoply</h1>

      <div class="error-box" id="error-box"></div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password" placeholder="Your password">
        </div>
        <button type="submit" class="btn btn-amber btn-block">Log in</button>
      </form>

      <div class="auth-foot">New to Shoply? <a href="register.html" style="color:var(--amber-dark); font-weight:600;">Create an account</a></div>
      <div class="auth-foot" style="margin-top:6px;">Admin demo: <span class="mono">admin@shoply.com</span> / <span class="mono">admin123</span></div>
    </div>
  </div>
</main>

<script src="js/app.js"></script>
<script>
  const form = document.getElementById('login-form');
  const errorBox = document.getElementById('error-box');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    errorBox.classList.remove('show');

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const user = Auth.login(email, password);

    if(!user){
      errorBox.textContent = 'Incorrect email or password.';
      errorBox.classList.add('show');
      return;
    }
    window.location.href = user.role === 'admin' ? 'admin-dashboard.html' : 'dashboard.html';
  });
</script>
</body>
</html>
