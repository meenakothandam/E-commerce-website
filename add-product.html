<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add product — Shoply Admin</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="topnav" id="topnav"></nav>

<div class="admin-shell">
  <aside class="admin-side" id="admin-side"></aside>
  <main class="admin-main">
    <div class="section-title">
      <h2 style="font-family:var(--font-display); font-size:1.6rem;">Add a product</h2>
    </div>

    <div class="card" style="padding:28px 30px; max-width:640px;">
      <div class="error-box" id="error-box"></div>
      <form id="product-form" novalidate>
        <div class="field">
          <label for="p-name">Product name</label>
          <input type="text" id="p-name" required placeholder="Aalto Pour-Over Kettle">
        </div>
        <div class="row-2">
          <div class="field">
            <label for="p-category">Category</label>
            <input type="text" id="p-category" required placeholder="Kitchen">
          </div>
          <div class="field">
            <label for="p-price">Price (₹)</label>
            <input type="number" id="p-price" required min="1" placeholder="1999">
          </div>
        </div>
        <div class="row-2">
          <div class="field">
            <label for="p-stock">Stock quantity</label>
            <input type="number" id="p-stock" required min="0" placeholder="10">
          </div>
          <div class="field">
            <label for="p-emoji">Display icon (emoji)</label>
            <input type="text" id="p-emoji" maxlength="4" placeholder="🫖" value="📦">
          </div>
        </div>
        <div class="field">
          <label for="p-desc">Description</label>
          <textarea id="p-desc" required placeholder="What makes this product worth buying?"></textarea>
        </div>
        <button type="submit" class="btn btn-amber">Add product</button>
      </form>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script>
  const session = Auth.requireRole('admin');

  if(session){
    renderAdminNav();
    renderAdminSidebar('add-product');

    const palette = ['#F3E7D8','#F0E4EE','#E6EEE0','#E4E7F0','#F0E8DC','#EDE1E1','#E2ECE8','#F2E9D9','#E6E6EE','#E8E4F0'];

    document.getElementById('product-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const errorBox = document.getElementById('error-box');
      errorBox.classList.remove('show');

      const name = document.getElementById('p-name').value.trim();
      const category = document.getElementById('p-category').value.trim();
      const price = Number(document.getElementById('p-price').value);
      const stock = Number(document.getElementById('p-stock').value);
      const art = document.getElementById('p-emoji').value.trim() || '📦';
      const description = document.getElementById('p-desc').value.trim();

      if(!name || !category || !description || price <= 0 || stock < 0){
        errorBox.textContent = 'Please fill in every field with valid values.';
        errorBox.classList.add('show');
        return;
      }

      const products = Store.getProducts();
      products.push({
        id: uid('p'), name, category, price, stock, art, description,
        color: palette[Math.floor(Math.random() * palette.length)]
      });
      Store.saveProducts(products);

      toast(`${name} was added to the catalog`);
      document.getElementById('product-form').reset();
      document.getElementById('p-emoji').value = '📦';
    });
  }
</script>
</body>
</html>
