<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My orders — Shoply</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="topnav" id="topnav"></nav>

<main class="wrap" style="padding-bottom:70px;">
  <div class="page-head">
    <div>
      <h1>My orders</h1>
      <div class="sub" id="orders-sub"></div>
    </div>
  </div>
  <div id="orders-content"></div>
</main>

<script src="js/app.js"></script>
<script>
  const session = Auth.requireRole('user');

  if(session){
    renderUserNav('orders');

    const params = new URLSearchParams(window.location.search);
    const justPlaced = params.get('justPlaced');
    if(justPlaced) toast('Order ' + orderCode(justPlaced) + ' has been placed — thank you!');

    const orders = Store.getOrdersFor(session.userId).sort((a,b) => new Date(b.date) - new Date(a.date));
    const content = document.getElementById('orders-content');
    document.getElementById('orders-sub').textContent = orders.length ? `${orders.length} order(s)` : '';

    if(orders.length === 0){
      content.innerHTML = `
        <div class="empty-state">
          <div class="glyph">📦</div>
          You haven't placed any orders yet.
          <br><br>
          <a href="dashboard.html" class="btn btn-amber">Start shopping</a>
        </div>`;
    } else {
      content.innerHTML = orders.map(o => `
        <div class="ticket" style="margin-bottom:20px;">
          <div class="ticket-head" style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:10px;">
            <div>
              <div class="ticket-code">${orderCode(o.id)} · ${formatDate(o.date)}</div>
              <div style="margin-top:4px; font-size:.85rem; color:var(--muted);">${o.paymentMethod}</div>
            </div>
            <span class="badge ${o.status.toLowerCase()}">${o.status}</span>
          </div>
          <div class="ticket-body">
            ${o.items.map(i => `
              <div class="summary-row"><span>${escapeHtml(i.name)} × ${i.qty}</span><span class="mono">${formatPrice(i.price * i.qty)}</span></div>
            `).join('')}
          </div>
          <div class="ticket-foot" style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:.82rem; color:var(--muted);">Deliver to: ${escapeHtml(o.address)}</span>
            <span class="mono" style="font-weight:700;">${formatPrice(o.total)}</span>
          </div>
        </div>
      `).join('');
    }
  }
</script>
</body>
</html>
